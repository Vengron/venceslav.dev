<style>
/* ── TOKENS ── */
:root {
  --bg:      #1A2035;
  --bg-deep: #131929;
  --bg-card: #1F2740;
  --red:     #FF3333;
  --red-dark:#CC1F1F;
  --white:   #FFFFFF;
  --muted:   rgba(255,255,255,0.45);
  --faint:   rgba(255,255,255,0.15);
  --border:  rgba(255,255,255,0.07);
  --grid:    rgba(255,255,255,0.022);
  --sans:    'Space Mono', monospace;
  --display: 'Bebas Neue', sans-serif;
}

/* ── RESET ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--white);
  font-family: var(--sans);
  font-size: 0.9rem;
  line-height: 1.75;
  font-weight: 400;
  overflow-x: hidden;
}

/* ── GRID TEXTURE (applied via class) ── */
.grid-overlay {
  position: relative;
}
.grid-overlay::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(var(--grid) 1px, transparent 1px),
    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 22px 22px;
  pointer-events: none;
  z-index: 0;
}
.grid-overlay > * { position: relative; z-index: 1; }

/* ── SHARED UTILITIES ── */
.eyebrow {
  font-family: var(--sans);
  font-size: 0.62rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--red);
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 0.6rem;
  margin-bottom: 1rem;
}
.eyebrow::before {
  content: '';
  display: block;
  width: 20px;
  height: 1px;
  background: var(--red);
  flex-shrink: 0;
}
.h2 {
  font-family: var(--display);
  font-size: clamp(2rem, 4vw, 3.2rem);
  line-height: 0.92;
  letter-spacing: 0.02em;
  color: var(--white);
  margin-bottom: 1.2rem;
}
.sub {
  font-size: 0.82rem;
  color: var(--muted);
  line-height: 1.8;
  max-width: 440px;
}
.btn-primary {
  display: inline-block;
  background: var(--red);
  color: var(--white);
  font-family: var(--sans);
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 0.85rem 2rem;
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: background 0.2s, transform 0.2s;
}
.btn-primary:hover { background: var(--red-dark); transform: translateY(-1px); }
.btn-outline {
  display: inline-block;
  border: 1px solid var(--faint);
  color: var(--white);
  font-family: var(--sans);
  font-size: 0.72rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 0.85rem 2rem;
  text-decoration: none;
  transition: border-color 0.2s, color 0.2s;
}
.btn-outline:hover { border-color: var(--red); color: var(--red); }
.chip {
  display: inline-block;
  background: rgba(255,255,255,0.07);
  color: var(--faint);
  font-size: 0.6rem;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  font-weight: 700;
  padding: 0.25rem 0.7rem;
}
hr.div {
  border: none;
  border-top: 1px solid var(--border);
}

/* ── SCROLL REVEAL ── */
.reveal {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.55s ease, transform 0.55s ease;
}
.reveal.visible {
  opacity: 1;
  transform: translateY(0);
}

/* ── NAV ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 200;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.1rem 3.5rem;
  transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
  border-bottom: 1px solid transparent;
}
nav.scrolled {
  background: rgba(26,32,53,0.94);
  backdrop-filter: blur(16px);
  border-color: var(--border);
  box-shadow: 0 2px 24px rgba(0,0,0,0.25);
}
.nav-logo {
  font-family: var(--display);
  font-size: 1.3rem;
  letter-spacing: 0.1em;
  color: var(--white);
  text-decoration: none;
}
.nav-logo span { color: var(--red); }
.nav-links { display: flex; gap: 2rem; list-style: none; align-items: center; }
.nav-links a {
  text-decoration: none;
  color: var(--muted);
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  transition: color 0.2s;
  position: relative;
}
.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -3px; left: 0; right: 0;
  height: 1px;
  background: var(--red);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.25s;
}
.nav-links a:hover { color: var(--white); }
.nav-links a:hover::after { transform: scaleX(1); }
.nav-cta {
  background: var(--red) !important;
  color: var(--white) !important;
  padding: 0.45rem 1.2rem;
}
.nav-cta::after { display: none !important; }
.nav-cta:hover { background: var(--red-dark) !important; }

/* ── HAMBURGER ── */
.hamburger {
  display: none; flex-direction: column; gap: 5px;
  cursor: pointer; background: none; border: none; padding: 4px; z-index: 300;
}
.hamburger span {
  display: block; width: 24px; height: 2px;
  background: var(--white); transition: transform 0.3s, opacity 0.3s;
}
.hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2) { opacity: 0; }
.hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

/* ── MOBILE MENU ── */
.mobile-menu {
  display: none; position: fixed; inset: 0; z-index: 190;
  background: var(--bg-deep);
  flex-direction: column; align-items: center; justify-content: center;
}
.mobile-menu.open { display: flex; }
.mobile-menu a {
  font-family: var(--display);
  font-size: 3rem;
  letter-spacing: 0.06em;
  color: var(--white);
  text-decoration: none;
  padding: 0.8rem 2rem;
  border-bottom: 1px solid var(--border);
  width: 100%; text-align: center;
  transition: color 0.2s;
}
.mobile-menu a:first-child { border-top: 1px solid var(--border); }
.mobile-menu a:hover { color: var(--red); }
.mobile-menu a.m-cta {
  background: var(--red);
  color: var(--white) !important;
  margin-top: 1.5rem;
  border: none;
}

/* ── ANIMATIONS ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
